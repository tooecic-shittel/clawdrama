# 生产部署（火山云云服务器 2C8G）——8G 内存可直接在服务器上构建镜像，无需镜像仓库/CI。
# 用法（在仓库根目录执行）：
#   cp deploy/.env.example deploy/.env && vim deploy/.env   # 填 key / JWT_SECRET
#   docker compose -f deploy/docker-compose.prod.yml up -d --build
# 默认用国内 npm 镜像构建（见 build.args），国内拉包快。
services:
  clawdrama:
    build:
      context: ..
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    # 只绑 127.0.0.1：对外由 nginx 反代 + TLS（见 nginx.conf.example）
    ports:
      - "127.0.0.1:5679:5679"
    volumes:
      # 数据盘目录（SQLite + 媒体）。没单独挂数据盘就把左边换成 ../data
      - /data/clawdrama:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5679
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
# 想改用「GitHub Actions 构建→推火山云 CR→服务器 pull」：把上面 build: 整段换成
#   image: ${IMAGE}    # 如 cr.volces.com/你的命名空间/clawdrama:latest
# 并在 .env 配 IMAGE；见 .github/workflows/deploy.yml。
