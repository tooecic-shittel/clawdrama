# 【可选】自动部署：GitHub 构建镜像 → 推镜像仓库 → SSH 服务器 pull 拉起。
# 注意：8G 服务器可直接本机构建（见 deploy/README.md 主流程），不一定需要这套 CI。
# 适用火山云 CR / 阿里云 ACR 等任意仓库——登录机制通用，填对应 registry 即可。
#
# 在仓库 Settings → Secrets and variables → Actions 配好（火山云 CR 也用这几个，名字随意）：
#   ACR_REGISTRY   仓库地址（火山云 CR 形如 cr.volces.com；阿里云形如 registry.cn-shanghai.aliyuncs.com）
#   ACR_NAMESPACE  命名空间
#   ACR_USERNAME   仓库用户名
#   ACR_PASSWORD   仓库访问凭证/密码
#   （可选，自动部署用）
#   SSH_HOST       服务器公网 IP
#   SSH_USER       如 root
#   SSH_KEY        服务器的 SSH 私钥
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 登录阿里云 ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 构建并推送镜像（amd64，对齐阿里云 x86 ECS）
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/clawdrama:latest

  # 可选：构建完自动登服务器拉新镜像并重启。不想自动部署就删掉这个 job，手动在服务器上 pull。
  deploy-ssh:
    needs: build-push
    runs-on: ubuntu-latest
    if: ${{ secrets.SSH_HOST != '' }}
    steps:
      - name: SSH 到服务器拉新镜像并重启
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/clawdrama
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
